name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Generate stats card
        id: stats
        continue-on-error: true
        uses: readme-tools/github-readme-stats-action@v2.0.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate top languages card
        id: top-langs
        continue-on-error: true
        uses: readme-tools/github-readme-stats-action@v2.0.1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Generate isometric calendar
        id: lowlightermetrics_isocalendar
        continue-on-error: true
        uses: lowlighter/metrics@366f8b9dfe3a59656c67d5dcad9950f59c9bc96d
        with:
          token: ${{ secrets.GH_PAT }}
          user: schembriaiden
          template: classic
          base: ""
          config_timezone: Europe/Malta
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: profile/isocalendar.svg
          output_action: none

      - name: Generate top repositories
        id: lowlightermetrics_repositories
        continue-on-error: true
        uses: lowlighter/metrics@366f8b9dfe3a59656c67d5dcad9950f59c9bc96d
        with:
          token: ${{ secrets.GH_PAT }}
          user: schembriaiden
          template: classic
          base: ""
          plugin_repositories: yes
          plugin_repositories_starred: 2
          plugin_repositories_affiliations: owner
          filename: profile/starred-repos.svg
          output_action: none

      - name: Generate Profile Trophy
        id: trophy
        continue-on-error: true
        uses: ryo-ma/github-profile-trophy@ccb591b887775ee567c0d9a38424ddfb9b1906c4
        with:
            token: ${{ secrets.GH_PAT }}
            username: schembriaiden
            output_path: profile/trophy.svg

      - name: Move metrics files and commit
        run: |
          if compgen -G "/metrics_renders/profile/*" > /dev/null; then
            sudo mv /metrics_renders/profile/* ./profile/
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: Update README cards" || exit 0
          git push

      - name: Report generator failures
        if: >-
          always() && (
            steps.stats.outcome == 'failure' ||
            steps.top-langs.outcome == 'failure' ||
            steps.lowlightermetrics_isocalendar.outcome == 'failure' ||
            steps.lowlightermetrics_repositories.outcome == 'failure' ||
            steps.trophy.outcome == 'failure'
          )
        env:
          STATS_OUTCOME: ${{ steps.stats.outcome }}
          TOP_LANGS_OUTCOME: ${{ steps.top-langs.outcome }}
          ISOCALENDAR_OUTCOME: ${{ steps.lowlightermetrics_isocalendar.outcome }}
          REPOSITORIES_OUTCOME: ${{ steps.lowlightermetrics_repositories.outcome }}
          TROPHY_OUTCOME: ${{ steps.trophy.outcome }}
        run: |
          echo "## Failed README card generators" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$STATS_OUTCOME" == "failure" ]]; then
            echo "::error title=Generator failed::Generate stats card"
            echo "- Generate stats card" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$TOP_LANGS_OUTCOME" == "failure" ]]; then
            echo "::error title=Generator failed::Generate top languages card"
            echo "- Generate top languages card" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$ISOCALENDAR_OUTCOME" == "failure" ]]; then
            echo "::error title=Generator failed::Generate isometric calendar"
            echo "- Generate isometric calendar" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$REPOSITORIES_OUTCOME" == "failure" ]]; then
            echo "::error title=Generator failed::Generate top repositories"
            echo "- Generate top repositories" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$TROPHY_OUTCOME" == "failure" ]]; then
            echo "::error title=Generator failed::Generate Profile Trophy"
            echo "- Generate Profile Trophy" >> "$GITHUB_STEP_SUMMARY"
          fi

          exit 1
